# Trimmed values — chart defaults handle everything else.
crds:
  enabled: true

# CSI drivers for both RBD (block) and CephFS (shared FS).
csi:
  enableRbdDriver: true
  enableCephfsDriver: true
  enableNFSDriver: false
  provisionerReplicas: 2

# Monitoring (ServiceMonitor + PrometheusRule). DISABLED because
# prometheus-operator isn't in the cluster — with monitoring.enabled=true
# the operator hot-loops failing to create ServiceMonitor CRs
# against a missing CRD, starving the OSD prepare path.
# Re-enable after deploying prometheus-operator.
monitoring:
  enabled: false

# Operator resource requests sized for the lab (CP nodes are
# 10 GiB / 4 vCPU per constants.nix vm).
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Tolerate the control-plane taint, in case future kubelet config
# adds it. Source repo's kubelet doesn't taint CPs today; this is
# defensive — no-op when CPs are untainted.
tolerations:
- key: "node-role.kubernetes.io/control-plane"
  operator: "Exists"
  effect: "NoSchedule"

