apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-external-client
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/randomizedcoder/ceph-on-k8s.git
    targetRevision: main
    path: rendered/ceph-external-client
    directory:
      recurse: false
      exclude: 'application.yaml'
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false

