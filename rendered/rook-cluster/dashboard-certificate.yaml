apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ceph-dashboard-tls
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: ceph-dashboard-tls
  duration: 720h0m0s     # 30 days
  renewBefore: 168h0m0s  # 7 days
  dnsNames:
  - ceph.lab.local
  issuerRef:
    name: selfsigned-lab
    kind: ClusterIssuer
    group: cert-manager.io

