apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: lab-bgp-cluster
spec:
  # Every Linux node in the cluster participates in BGP.
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
  - name: lab-instance
    localASN: 64512
    peers:
    - name: host-frr
      peerASN: 64513
      peerAddress: 10.33.33.1
      peerConfigRef:
        name: lab-bgp-peer

